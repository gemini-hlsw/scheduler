server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  index index.html;

  location / {
    # Try serving the file directly, otherwise fall back to index.html for SPA routing
    try_files $uri $uri/ /index.html;
  }

  # Optional: Proxy API requests to a separate backend if needed
  # location /api/ {
  #   proxy_pass http://localhost:3000/; # Adjust the backend port as necessary
  #   # Include headers for proper request handling
  #   proxy_set_header Host $host;
  #   proxy_set_header X-Real-IP $remote_addr;
  # }
}
