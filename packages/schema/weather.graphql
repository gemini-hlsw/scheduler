# This "Weather" type defines the queryable fields for every weather in our data source.
type Weather {
  site: String
  imageQuality: Float
  cloudCover: Float
  windDirection: Float
  windSpeed: Float
}

input WeatherInput {
  site: String
  imageQuality: Float
  cloudCover: Float
  windDirection: Float
  windSpeed: Float
}

# The "Query" type is special: it lists all of the available queries that
# clients can execute, along with the return type for each. In this
# case, the "weather" query returns an array of zero or more Weather (defined above).
type Query {
  weather: [Weather]
}

type Mutation {
  updateWeather(weatherInput: WeatherInput): Weather
}

type Subscription {
  weatherUpdates: Weather
}
