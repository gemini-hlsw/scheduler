name: Deploy Staging to Heroku

on:
  workflow_dispatch: # Manual trigger for testing
  push:
    branches:
      - main

jobs:
  build-deploy-scheduler:
    name: Scheduler Staging Deploy (${{ matrix.mode }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - mode: realtime
            app_mode: operation
            app_secret: HEROKU_APP_NAME_REALTIME_STAGING
          - mode: multinight
            app_mode: validation
            app_secret: HEROKU_APP_NAME_MULTINIGHT_STAGING
    steps:
      - name: Set version tag
        run: echo "VERSION_TAG=$(date +'%Y%m%d')_$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Verify LFS files
        run: |
          echo "Checking LFS status:"
          git lfs ls-files
          echo "Checking if LFS files exist locally:" 
          ls -la packages/scheduler/scheduler/services/horizons/data/
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Login to Heroku Container registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login
      - name: Build and push
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:push -a ${{ secrets[matrix.app_secret] }} scheduler --recursive \
          --arg APP_VERSION=${{ env.VERSION_TAG }}-staging-${{ matrix.mode }}

      - name: Release
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release -a ${{ secrets[matrix.app_secret] }} scheduler

  build-deploy-web:
    name: Schedule UI Staging Deploy
    runs-on: ubuntu-latest
    steps:
      # Check-out your repository.
      - name: Checkout
        uses: actions/checkout@v3
      # Update the version in src/version.json
      - name: Set version tag
        run: sed -i "s/development/$(date +'%Y%m%d')_$(echo $GITHUB_SHA | cut -c1-7)/" packages/web/src/version.json
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Build, Push and Release a Docker container to Heroku.
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          # Below you must provide variables for your Heroku app.

          # The email address associated with your Heroku account.
          # If you don't want to use repository secrets (which is recommended) you can do:
          # email: my.email@example.com
          heroku_email: ${{ secrets.HEROKU_EMAIL }}

          # Heroku API key associated with provided user's email.
          # Api Key is available under your Heroku account settings.
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}

          # Name of the heroku application to which the build is to be sent.
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME }}
          buildpack: heroku-community/nginx

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-deploy-scheduler
    steps:
      - uses: actions/checkout@v4
      - name: Deploy documentation
        run: |
          pip install mkdocs-material mkdocs-mermaid2-plugin mkdocstrings-python && cd packages/scheduler && mkdocs gh-deploy --force --clean --verbose
