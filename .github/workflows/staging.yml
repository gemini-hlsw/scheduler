name: Deploy Staging to Heroku

on:
  workflow_dispatch: # Manual trigger for testing
  push:
    branches:
      - main

jobs:
  get-version:
    name: Calculate version tag
    runs-on: ubuntu-latest
    outputs:
      version-tag: ${{ steps.set-version-tag.outputs.version-tag }}
      get-heroku-api-key: ${{ steps.get-heroku-api-key.outputs.HEROKU_API_KEY }}
    steps:
      - name: Set version tag
        id: set-version-tag
        run: echo "version-tag=$(date +'%Y%m%d')_$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
      - name: Get heroku api key secret
        id: get-heroku-api-key
        run: echo "HEROKU_API_KEY=$(echo ${{ secrets.HEROKU_API_KEY }})" >> $GITHUB_ENV

  build-deploy-scheduler:
    name: Scheduler Staging Deploy (${{ matrix.mode }})
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION_TAG: ${{ needs.get-version.outputs.version-tag }}
      HEROKU_API_KEY: ${{ needs.get-version.outputs.get-heroku-api-key }}
    strategy:
      matrix:
        include:
          - mode: realtime
            app_mode: operation
            app_secret: HEROKU_APP_NAME_REALTIME_STAGING
          - mode: multinight
            app_mode: validation
            app_secret: HEROKU_APP_NAME_MULTINIGHT_STAGING
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Verify LFS files
        run: |
          echo "Checking LFS status:"
          git lfs ls-files
          echo "Checking if LFS files exist locally:" 
          ls -la packages/scheduler/scheduler/services/horizons/data/
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Login to Heroku Container registry
        run: heroku container:login
      - name: Build and push container to Heroku registry
        run: |
          heroku container:push -a ${{ secrets[matrix.app_secret] }} backend \
          --arg APP_VERSION=${{ env.VERSION_TAG }}-staging-${{ matrix.mode }}
      - name: Release container on Heroku
        run: |
          heroku container:release -a ${{ secrets[matrix.app_secret] }} backend

  frontend:
    name: Schedule UI Staging Deploy
    runs-on: ubuntu-latest
    needs: get-version
    env:
      VERSION_TAG: ${{ needs.get-version.outputs.version-tag }}
      HEROKU_API_KEY: ${{ needs.get-version.outputs.get-heroku-api-key }}
    steps:
      - uses: actions/checkout@v4
      - name: Set version tag
        run: sed -i "s/development/${{ env.VERSION_TAG }}/" src/version.json
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Build and push container to Heroku registry
        run: |
          heroku container:push -a ${{ secrets.HEROKU_FRONTEND_APP_NAME }} frontend
      - name: Release container on Heroku
        run: |
          heroku container:release -a ${{ secrets.HEROKU_FRONTEND_APP_NAME }} frontend

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: build-deploy-scheduler
    steps:
      - uses: actions/checkout@v4
      - name: Deploy documentation
        run: |
          pip install mkdocs-material mkdocs-mermaid2-plugin mkdocstrings-python && cd backend && mkdocs gh-deploy --force --clean --verbose
