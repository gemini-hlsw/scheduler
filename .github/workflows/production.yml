name: Deploy Production to Heroku

on:
  push:
    tags:
      - "v*"

jobs:
  scheduler-deploy:
    name: Scheduler Production Deploy
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - mode: realtime
            app_mode: operation
            app_secret: HEROKU_APP_NAME_REALTIME_PRODUCTION
          - mode: multinight
            app_mode: validation
            app_secret: HEROKU_APP_NAME_MULTINIGHT_PRODUCTION
    steps:
      - name: Set version tag
        run: echo "VERSION_TAG=$(date +'%Y%m%d')_$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV
      - uses: actions/checkout@v4
        with:
          lfs: "true"
      - name: Checkout LFS objects
        run: git lfs checkout
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Login to Heroku Container registry
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: heroku container:login
      - name: Build and push
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:push -a ${{ secrets.HEROKU_PRODUCTION_APP_NAME }} scheduler --recursive \
          --arg GH_PAT=${{ secrets.GH_PAT }} \
          --arg APP_VERSION=${{ env.VERSION_TAG }}-staging-${{ matrix.mode }}
      - name: Release
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          heroku container:release -a ${{ secrets[matrix.app_secret] }} scheduler

  web-deploy:
    name: Schedule UI Production Deploy
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      # Check-out your repository.
      - name: Checkout
        uses: actions/checkout@v3
      # Update the version in src/version.json
      - name: Set version tag
        run: sed -i "s/development/$(date +'%Y%m%d')_$(echo $GITHUB_SHA | cut -c1-7)/" src/version.json
      # - name: Replace schedule url
      #   run: sed -i "s/SCHEDULER_BACKEND_URL,/\"https\:\/\/gpp-schedule-prod.herokuapp.com\/graphql\",/g" src/apollo-client.ts
      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh
      - name: Build, Push and Release a Docker container to Heroku.
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          # Below you must provide variables for your Heroku app.

          # The email address associated with your Heroku account.
          # If you don't want to use repository secrets (which is recommended) you can do:
          # email: my.email@example.com
          heroku_email: ${{ secrets.HEROKU_EMAIL }}

          # Heroku API key associated with provided user's email.
          # Api Key is available under your Heroku account settings.
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}

          # Name of the heroku application to which the build is to be sent.
          heroku_app_name: ${{ secrets.HEROKU_APP_NAME_PROD }}
          buildpack: heroku-community/nginx
