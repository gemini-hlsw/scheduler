###############################################################################
# Deploy to DEV (Heroku Staging)
# Auto-deploys on merge to main.
# Only deploys what changed: backend, frontend, or both.
#
# GitHub Environments used:
#   - dev-backend  → shows backend API URL in Deployments tab
#   - dev-frontend → shows frontend URL in Deployments tab
###############################################################################
name: Deploy to DEV

on:
  push:
    branches: [main]

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
  DEV_REALTIME_APP: ${{ secrets.HEROKU_APP_NAME_REALTIME_STAGING }}
  DEV_MULTINIGHT_APP: ${{ HEROKU_APP_NAME_MULTINIGHT_STAGING }}
  DEV_FRONTEND_APP: ${{ secrets.HEROKU_APP_NAME_FRONTEND_STAGING }}

jobs:
  # ── Detect what changed ──────────────────────────────────────────────────
  changes:
    name: Detect Changes
    uses: ./.github/workflows/detect-changes.yml

  # ── Deploy Backend ───────────────────────────────────────────────────────
  deploy-backend:
    name: "Deploy Backend → DEV"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    environment:
      name: dev-backend
    strategy:
      matrix:
        include:
          - mode: realtime
            app_mode: operation
            app_secret: HEROKU_APP_NAME_REALTIME_STAGING
          - mode: multinight
            app_mode: validation
            app_secret: HEROKU_APP_NAME_MULTINIGHT_STAGING
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Verify LFS files
        run: |
          echo "Checking LFS status:"
          git lfs ls-files
          echo "Checking if LFS files exist locally:" 
          ls -la backend/scheduler/services/horizons/data/

      - uses: ./.github/actions/setup-python-uv
        with:
          python-version: "3.11"

      - name: Extract version
        id: version
        run: |
          VERSION=$(uv run python -c "
          try:
              import tomllib
              with open('pyproject.toml', 'rb') as f:
                  data = tomllib.load(f)
              print(data['project']['version'])
          except:
              from version import __version__
              print(__version__)
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container registry
        run: heroku container:login

      - name: Build and push container to Heroku registry
        run: |
          heroku container:push -a ${{ secrets[matrix.app_secret] }} web \
          --arg APP_VERSION=${{ steps.version.outputs.version }}-staging-${{ matrix.mode }}

      - name: Release container on Heroku
        run: |
          heroku container:release -a ${{ secrets[matrix.app_secret] }} web

  # ── Deploy Frontend ──────────────────────────────────────────────────────
  deploy-frontend:
    name: "Deploy Frontend → DEV"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    environment:
      name: dev-frontend
    steps:
      - uses: actions/checkout@v4
      - name: Set version tag
        run: sed -i "s/development/${{ env.VERSION_TAG }}/" src/version.json

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container registry
        run: heroku container:login

      - name: Build and push container to Heroku registry
        run: |
          heroku container:push -a ${{ secrets.HEROKU_APP_NAME_FRONTEND_STAGING }} web

      - name: Release container on Heroku
        run: |
          heroku container:release -a ${{ secrets.HEROKU_APP_NAME_FRONTEND_STAGING }} web

  # ── Notify ───────────────────────────────────────────────────────────────
  notify:
    name: Notify to Slack channel
    runs-on: ubuntu-latest
    needs: [changes, deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result != 'skipped' || needs.deploy-frontend.result != 'skipped')
    steps:
      - name: Build summary
        id: summary
        run: |
          PARTS=""
          if [ "${{ needs.deploy-backend.result }}" = "success" ]; then
            PARTS="${PARTS}✅ Backend  "
          elif [ "${{ needs.deploy-backend.result }}" = "failure" ]; then
            PARTS="${PARTS}❌ Backend  "
          else
            PARTS="${PARTS}⏭️ Backend (skipped)  "
          fi

          if [ "${{ needs.deploy-frontend.result }}" = "success" ]; then
            PARTS="${PARTS}✅ Frontend"
          elif [ "${{ needs.deploy-frontend.result }}" = "failure" ]; then
            PARTS="${PARTS}❌ Frontend"
          else
            PARTS="${PARTS}⏭️ Frontend (skipped)"
          fi

          echo "summary=${PARTS}" >> "$GITHUB_OUTPUT"

      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "🚀 *DEV Deploy*\n${{ steps.summary.outputs.summary }}\nBy: ${{ github.actor }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
