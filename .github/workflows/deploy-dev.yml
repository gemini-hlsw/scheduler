###############################################################################
# Deploy to DEV (Heroku Staging)
# Auto-deploys on merge to main.
# Only deploys what changed: backend, frontend, or both.
#
# GitHub Environments used:
#   - dev-backend  → shows backend API URL in Deployments tab
#   - dev-frontend → shows frontend URL in Deployments tab
###############################################################################
name: Deploy to DEV

on:
  push:
    branches: [main]
    tags-ignore: ['**']

concurrency:
  group: deploy-dev
  cancel-in-progress: false

env:
  DEV_FRONTEND_APP: ${{ secrets.HEROKU_APP_NAME_FRONTEND_STAGING }}

jobs:
  changes:
    name: Detect Changes
    uses: ./.github/workflows/detect-changes.yml

  deploy-backend:
    name: "Deploy Backend → DEV"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || needs.changes.outputs.shared == 'true'
    environment:
      name: dev-backend
    strategy:
      matrix:
        include:
          - mode: realtime
            app_mode: operation
            app_secret: HEROKU_APP_NAME_REALTIME_STAGING
          - mode: multinight
            app_mode: validation
            app_secret: HEROKU_APP_NAME_MULTINIGHT_STAGING
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Verify LFS files
        run: |
          echo "Checking LFS status:"
          git lfs ls-files
          echo "Checking if LFS files exist locally:" 
          ls -la backend/scheduler/services/horizons/data/

      - uses: ./.github/actions/setup-uv
        with:
          python-version: "3.11"

      - name: Extract version
        id: version
        run: |
          VERSION=$(uv run python -c "
          try:
              import tomllib
              with open('pyproject.toml', 'rb') as f:
                  data = tomllib.load(f)
              print(data['project']['version'])
          except:
              from version import __version__
              print(__version__)
          ")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Login to Heroku Container registry
        run: heroku container:login

      - name: Build and push container to Heroku registry
        run: |
          heroku container:push -a ${{ secrets[matrix.app_secret] }} web \
          --arg APP_VERSION=${{ steps.version.outputs.version }}-staging-${{ matrix.mode }}

      - name: Release container on Heroku
        run: |
          heroku container:release -a ${{ secrets[matrix.app_secret] }} web

  deploy-frontend:
    name: "Deploy Frontend → DEV"
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    environment:
      name: dev-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Install Heroku CLI
        run: curl https://cli-assets.heroku.com/install.sh | sh

      - name: Build, Push and Release a Docker container to Heroku.
        uses: akhileshns/heroku-deploy@v3.12.12
        with:
          # Below you must provide variables for your Heroku app.
          heroku_email: ${{ secrets.HEROKU_EMAIL }}
          heroku_api_key: ${{ secrets.HEROKU_API_KEY }}

          # Name of the heroku application to which the build is to be sent.
          heroku_app_name: ${{ env.DEV_FRONTEND_APP }}
          buildpack: heroku-community/nginx
