name: PR Jira Link

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  link:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: https://noirlab.atlassian.net/browse
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/[A-Z]+-\d+/);
            const body = context.payload.pull_request.body || '';
            const START = '<!-- JIRA:START -->';
            const END = '<!-- JIRA:END -->';

            const link = match
              ? `[${match[0]}](${process.env.JIRA_BASE_URL}/${match[0]})`
              : '_(no Jira ticket detected on branch name)_';
            const section = `${START}\n${link}\n${END}`;

            let newBody;
            if (body.includes(START) && body.includes(END)) {
              const regex = new RegExp(`${START}[\\s\\S]*?${END}`);
              newBody = body.replace(regex, section);
            } else if (body.includes('## Jira')) {
              // PR body has the heading but no markers — replace the heading's
              // placeholder content (everything up to the next H2 or end of body).
              const regex = /## Jira\n[\s\S]*?(?=\n## |\n*$)/;
              newBody = body.replace(regex, `## Jira\n\n${section}\n`);
            } else {
              // No Jira section at all — append one.
              newBody = `${body}\n\n## Jira\n\n${section}\n`;
            }

            if (newBody === body) return;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: newBody,
            });