name: PR Jira Link

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  link:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        env:
          JIRA_BASE_URL: https://noirlab.atlassian.net/browse
        with:
          script: |
            const branch = context.payload.pull_request.head.ref;
            const match = branch.match(/[A-Z]+-\d+/);
            const body = context.payload.pull_request.body || '';
            const START = '<!-- JIRA:START -->';
            const END = '<!-- JIRA:END -->';
            if (!body.includes(START) || !body.includes(END)) return;

            const replacement = match
              ? `[${match[0]}](${process.env.JIRA_BASE_URL}/${match[0]})`
              : '_(no Jira ticket detected on branch name)_';

            const regex = new RegExp(`${START}[\\s\\S]*?${END}`);
            const newBody = body.replace(
              regex,
              `${START}\n${replacement}\n${END}`
            );
            if (newBody === body) return;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              body: newBody,
            });