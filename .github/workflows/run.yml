name: Run Scripts
on: [pull_request]
jobs:
  run:
    runs-on: ubuntu-latest
    environment: schedule-staging
    timeout-minutes: 30

    steps:
      - name: Check out repository code
        uses: actions/checkout@v4
      - name: Setup Python environment
        uses: ./.github/actions/setup-uv
      - name: Add $PYTHONPATH
        run: echo "PYTHONPATH=$(pwd)/backend/" >> $GITHUB_ENV

      - name: Run Greedymax
        env:
          REDISCLOUD_URL: ${{ secrets.REDISCLOUD_URL }}
          GPP_URL: ${{ secrets.GPP_URL }}
          GPP_KEY: ${{ secrets.GPP_KEY }}
        run: uv run python backend/scheduler/scripts/run.py
